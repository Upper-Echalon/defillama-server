# API2 - nginx config
#
# All requests proxy to Node. Node handles routing, normalization, and validation.
# For file responses, Node returns X-Accel-Redirect and nginx serves the file.
#

upstream node_backend {
    server 127.0.0.1:5000;  # NODE_BACKEND_PORT
    keepalive 16;
}

server {
    listen 5001;  # NGINX_LISTEN_PORT
    server_name _;

    default_type application/json;
    charset utf-8;

    # CORS — strip any upstream CORS headers so nginx is the single source of truth
    # (prevents duplicate Access-Control-Allow-Origin when upstreams like api.llama.fi
    # also send `*`, which browsers reject).
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Access-Control-Max-Age;

    add_header Access-Control-Allow-Origin  '*' always;
    add_header Access-Control-Allow-Methods 'GET,PUT,POST,DELETE,OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Content-Type, authorization' always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Internal: Node returns X-Accel-Redirect to here, nginx serves the file
    location /_internal/cache/ {
        internal;
        alias /app/cache/build/;  # CACHE_DIR/build/
        add_header Cache-Control 'public, max-age=1798' always;

        # this duplicate is needed as we are setting a header in the line above and inheriting headers is disabled by default in nginx when a header is set
        add_header Access-Control-Allow-Origin  '*' always;
        add_header Access-Control-Allow-Methods 'GET,PUT,POST,DELETE,OPTIONS' always;
        add_header Content-Type 'application/json' always;
    }

    # Everything goes to Node
    location / {
        proxy_pass              http://node_backend;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        Connection "";
    }
}
